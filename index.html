<body>

<div id="particles"></div>

<header>

<h1>⚡ RandomRush</h1>
<p>🎲 Unlimited Ideas. Infinite Inspiration.</p>

</header>

<div class="container">

<div class="generator-card">

<label>
<i class="fa-solid fa-layer-group"></i> Choose Generator
</label>

<select id="category">

<option value="username">👤 Username Generator</option>
<option value="business">🏢 Business Name Generator</option>
<option value="youtube">🎬 YouTube Video Idea</option>
<option value="startup">🚀 Startup Idea</option>
<option value="story">📖 Story Idea</option>

</select>

<button onclick="generate()">
<i class="fa-solid fa-bolt"></i> Generate
</button>

<div id="result">
✨ Click Generate
</div>

<div class="buttons">

<button onclick="copyText()">
<i class="fa-solid fa-copy"></i> Copy
</button>

<button onclick="shareText()">
<i class="fa-solid fa-share"></i> Share
</button>

</div>

</div>

</div>

<footer>

<p>💡 "Ideas appear when randomness meets creativity."</p>
<p>🚀 "Your next big idea might be one click away."</p>
<p>🎲 "Powered by imagination."</p>
